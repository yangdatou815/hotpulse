name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio==0.23.8 httpx aiosqlite eval_type_backport pytest-cov pytest-timeout
      - name: Compile check
        run: python -m compileall app workers
      - name: Run tests with coverage
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
        run: |
          echo "Python: $(python --version)"
          echo "DATABASE_URL=$DATABASE_URL"
          pip list | grep -i async
          python -m pytest tests/ -v --tb=short --timeout=30 \
            --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml \
            || python -m pytest tests/ -v --tb=long --timeout=30
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - name: Type check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
