version: "3.9"

services:
  api:
    build:
      context: ../..
      dockerfile: infra/docker/backend.Dockerfile
    environment:
      - DATABASE_URL=postgresql+asyncpg://hotpulse:hotpulse@db:5432/hotpulse
    ports:
      - "8000:8000"
    depends_on:
      - db

  web:
    build:
      context: ../..
      dockerfile: infra/docker/frontend.Dockerfile
    environment:
      - VITE_API_BASE=http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    depends_on:
      - api

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: hotpulse
      POSTGRES_USER: hotpulse
      POSTGRES_PASSWORD: hotpulse
    ports:
      - "5432:5432"
